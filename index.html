<!doctype html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Static build-time favicon: postq vpn's own shield mark (same asset
         served by the backend at /cabinet/branding/logo for this deployment),
         so unauthenticated pages (e.g. /login, before branding loads) show the
         real brand instead of a generic monogram. favicon.ico/apple-touch-icon.png
         are raster fallbacks for browsers without SVG favicon support (notably
         Safari, both desktop and iOS) — favicon.svg is preferred where supported.
         Runtime code in utils/favicon.ts overrides these with the actual
         per-deployment branding logo once it loads (see useBranding / Login.tsx). -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0f1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>VPN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <script>
      // Load Telegram Web App script only inside Telegram environment
      (function () {
        var isTelegram =
          window.TelegramWebviewProxy ||
          location.hash.indexOf('tgWebApp') !== -1 ||
          location.search.indexOf('tgWebApp') !== -1;
        if (isTelegram) {
          var s = document.createElement('script');
          s.src = 'https://telegram.org/js/telegram-web-app.js';
          s.async = true;
          document.head.appendChild(s);
        }
      })();
    </script>
    <style>
      body {
        background-color: #0a0f1a;
      }
    </style>
    <link rel="stylesheet" href="/custom.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="/postq-custom.js"></script>
  </body>
</html>
